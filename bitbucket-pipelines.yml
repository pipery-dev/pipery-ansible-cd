# ============================================================================
# Bitbucket Pipelines Configuration for pipery-ansible-cd
# Production-Ready Infrastructure Automation via Ansible
# ============================================================================
#
# SETUP: Configure Protected Variables
# - ANSIBLE_VAULT_PASSWORD: Ansible vault password (Secured)
# - ANSIBLE_SSH_KEY: SSH private key for managed hosts (Secured, base64-encoded)
# - ANSIBLE_BECOME_PASSWORD: Sudo password for privilege escalation (Secured, optional)
#
# FEATURES:
# - Run Ansible playbooks for infrastructure deployment
# - Support for multiple inventory sources
# - Ansible vault for secret management
# - Parallel execution with configurable concurrency

definitions:
  steps:
    - step: &checkout-step
        name: Checkout Repository
        image: alpine:latest
        script:
          - echo "Repository ready at $BITBUCKET_BRANCH:$BITBUCKET_COMMIT"
          - ls -la

    - step: &setup-step
        name: Setup Ansible Environment
        image: alpine:latest
        script:
          - echo "Setting up Ansible deployment environment..."
          - apk add --no-cache curl bash wget tar gzip git openssh-client python3 py3-pip
          - pip3 install --quiet ansible
          - ansible --version
          - echo "Ansible environment ready"

    - step: &download-step
        name: Validate Ansible Configuration
        image: alpine:latest
        script:
          - echo "Validating Ansible configuration..."
          - apk add --no-cache python3 py3-pip
          - pip3 install --quiet ansible
          - |
            if [ -z "${INPUT_PLAYBOOK}" ] || [ -z "${INPUT_INVENTORY}" ]; then
              echo "ERROR: INPUT_PLAYBOOK and INPUT_INVENTORY must be set"
              exit 1
            fi
          - echo "Configuration validated: ${INPUT_PLAYBOOK} with ${INPUT_INVENTORY}"

    - step: &deploy-step-script
        name: Deploy via Ansible Playbook
        image: alpine:latest
        script:
          - apk add --no-cache curl bash openssh-client python3 py3-pip
          - pip3 install --quiet ansible
          - ./src/step-deploy.sh

    - step: &status-check-step
        name: Verify Deployment Status
        image: alpine:latest
        script:
          - apk add --no-cache openssh-client python3 py3-pip
          - pip3 install --quiet ansible
          - ./src/step-status.sh

    - step: &logs-step
        name: Collect & Archive Logs
        image: alpine:latest
        script:
          - echo "Archiving deployment logs..."
          - mkdir -p logs
          - |
            {
              echo "Ansible Deployment Report"
              echo "=========================="
              echo "Playbook: $ANSIBLE_PLAYBOOK"
              echo "Inventory: $ANSIBLE_INVENTORY"
              echo "Strategy: $DEPLOY_STRATEGY"
              echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "Status: SUCCESS"
            } > logs/deployment_report.txt
        artifacts:
          - logs/**

variables:
  INPUT_PROJECT_PATH: "."
  INPUT_CONFIG_FILE: ".pipery/config.yaml"

  # Ansible Playbook Configuration
  INPUT_PLAYBOOK: ""                   # Path to Ansible playbook file (required)
  INPUT_INVENTORY: "inventory"         # Path to inventory file

  # Ansible Execution Options
  INPUT_REQUIREMENTS: ""               # Path to requirements.txt
  INPUT_ANSIBLE_REQUIREMENTS: ""       # Path to requirements.yml

  # Ansible Variables
  INPUT_EXTRA_VARS: ""                 # Additional variables
  INPUT_BECOME: "false"                # Use sudo/become
  INPUT_TAGS: ""                       # Tags to run

  # Ansible Secrets Management
  # INPUT_SSH_KEY: (Set as Protected Variable, base64-encoded)
  # INPUT_SSH_KNOWN_HOSTS: (Set as Protected Variable, optional)

  # Feature Flags
  INPUT_SKIP_REQUIREMENTS: "false"
  INPUT_SKIP_DEPLOY: "false"
  INPUT_SKIP_STATUS_CHECK: "false"

  # Logging
  INPUT_LOG_FILE: "pipery.jsonl"

pipelines:
  default:
    - step: *checkout-step
    - step: *setup-step
    - step: *download-step
    - step:
        <<: *deploy-step-script
        trigger: manual
    - step:
        <<: *status-check-step
        optional: true
    - step: *logs-step

  branches:
    main:
      - step: *checkout-step
      - step: *setup-step
      - step: *download-step
      - step:
          <<: *deploy-step-script
          trigger: manual
      - step:
          <<: *status-check-step
          optional: true
      - step: *logs-step

  pull-requests:
    feature/**:
      - step: *checkout-step
      - step: *setup-step
      - step:
          <<: *download-step
          optional: true
      - step: *logs-step

  custom:
    deploy:
      - step: *checkout-step
      - step: *setup-step
      - step: *download-step
      - step:
          <<: *deploy-step-script
          trigger: manual
      - step:
          <<: *status-check-step
          optional: true
      - step: *logs-step

    dry-run:
      - step: *checkout-step
      - step: *setup-step
      - step: *download-step
      - step:
          name: Dry-Run Ansible Playbook
          image: alpine:latest
          script:
            - echo "Running Ansible playbook in check/dry-run mode..."
            - apk add --no-cache openssh-client python3 py3-pip
            - pip3 install --quiet ansible
            - |
              ANSIBLE_CMD="ansible-playbook --check --diff"
              if [ -n "$ANSIBLE_VAULT_PASSWORD" ]; then
                echo "$ANSIBLE_VAULT_PASSWORD" > /tmp/vault_pass
                chmod 600 /tmp/vault_pass
                ANSIBLE_CMD="$ANSIBLE_CMD --vault-password-file=/tmp/vault_pass"
              fi
              ANSIBLE_CMD="$ANSIBLE_CMD -i $ANSIBLE_INVENTORY $ANSIBLE_PLAYBOOK"
              eval "$ANSIBLE_CMD"
      - step: *logs-step
