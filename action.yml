name: 'Pipery Ansible CD'
description: 'CD pipeline for Ansible: install requirements → run playbook → verify status. Deploy to VMs or bare metal.'
inputs:
  project_path:
    description: 'Path to the project source tree.'
    required: false
    default: '.'
  config_file:
    description: 'Path to the pipery config file.'
    required: false
    default: '.pipery/config.yaml'
  playbook:
    description: 'Path to the Ansible playbook file.'
    required: false
    default: 'playbook.yml'
  inventory:
    description: 'Path to the Ansible inventory file.'
    required: false
    default: 'inventory'
  requirements:
    description: 'Path to requirements.txt for pip.'
    required: false
    default: ''
  ansible_requirements:
    description: 'Path to requirements.yml for ansible-galaxy.'
    required: false
    default: ''
  extra_vars:
    description: 'Extra variables as JSON or key=val pairs.'
    required: false
    default: ''
  ssh_key:
    description: 'SSH private key for connecting to hosts.'
    required: false
    default: ''
  ssh_known_hosts:
    description: 'Known hosts content for SSH.'
    required: false
    default: ''
  become:
    description: 'Use sudo/become for privilege escalation.'
    required: false
    default: 'false'
  tags:
    description: 'Comma-separated playbook tags to run.'
    required: false
    default: ''
  skip_requirements:
    description: 'Skip pip/galaxy requirements install.'
    required: false
    default: 'false'
  skip_deploy:
    description: 'Skip playbook run step.'
    required: false
    default: 'false'
  skip_status_check:
    description: 'Skip status check step.'
    required: false
    default: 'false'
  log_file:
    description: 'Path to write the JSONL log file.'
    required: false
    default: 'pipery.jsonl'
runs:
  using: composite
  steps:
    - id: main
      shell: bash
      run: |
        set -euo pipefail
        project_path="${INPUT_PROJECT_PATH:-${PIPERY_TEST_PROJECT_PATH:-.}}"
        log_path="${PIPERY_LOG_PATH:-pipery.jsonl}"
        if [ ! -d "$project_path" ]; then
          echo "Expected project path to exist: $project_path" >&2
          exit 1
        fi
        printf '{"event":"build","status":"success","project_path":"%s"}\n' "$project_path" > "$log_path"
        echo "Implement your action logic here for $project_path."
branding:
  icon: package
  color: blue
