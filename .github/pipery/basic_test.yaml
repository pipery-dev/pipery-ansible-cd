name: basic-test
description: "Test pipery-ansible-cd action, skip advanced steps"
source_path: test-project
inputs:
  playbook: "playbook.yml"
  inventory: "inventory"
  skip_requirements: "true"
  skip_deploy: "true"
  skip_status_check: "true"
expect:
  log_path: pipery.jsonl
  success_values: [success, passed, ok, succeeded]
  required_fields:
    - name: event
      value: deploy
