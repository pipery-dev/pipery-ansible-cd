spec:
  inputs:
    inputs:
    - name: PROJECT_PATH
      default: .
      description: Path to the project source tree
  outputs:
  - name: LOG_FILE
    description: Pipery JSONL log file with pipeline events
    default: pipery.jsonl
variables:
  PROJECT_PATH: .
  CONFIG_FILE: .pipery/config.yaml
  INPUT_PROJECT_PATH: .
  INPUT_CONFIG_FILE: .pipery/config.yaml
  INPUT_PLAYBOOK: playbook.yml
  INPUT_INVENTORY: inventory
  INPUT_REQUIREMENTS: ''
  INPUT_ANSIBLE_REQUIREMENTS: ''
  INPUT_EXTRA_VARS: ''
  INPUT_BECOME: 'false'
  INPUT_TAGS: ''
  INPUT_SKIP_REQUIREMENTS: 'false'
  INPUT_SKIP_DEPLOY: 'false'
  INPUT_SKIP_STATUS_CHECK: 'false'
  INPUT_LOG_FILE: pipery.jsonl
stages:
- checkout
- setup
- download
- requirements
- deploy
- status_check
- logs
checkout:
  stage: checkout
  image: alpine:latest
  script:
  - echo "Repository checked out"
setup:
  stage: setup
  image: python:3.11-alpine
  before_script:
  - apk add --no-cache bash openssh-client
  script:
  - echo "Setting up Ansible environment..."
  - pip install ansible
  - ansible --version
  - echo "Setup complete"
download:
  stage: download
  image: alpine:latest
  script:
  - echo "Validating Ansible configuration..."
  - "if [ -z \"${INPUT_PLAYBOOK}\" ] || [ -z \"${INPUT_INVENTORY}\" ]; then\n  echo\
    \ \"ERROR: INPUT_PLAYBOOK and INPUT_INVENTORY must be set\"\n  exit 1\nfi\n"
  - echo "Configuration validated: ${INPUT_PLAYBOOK} with ${INPUT_INVENTORY}"
requirements:
  stage: requirements
  image: python:3.11-alpine
  before_script:
  - apk add --no-cache bash
  - pip install ansible
  script:
  - ./src/step-setup.sh
  rules:
  - if: $INPUT_SKIP_REQUIREMENTS == "true"
    when: never
  - when: on_success
  allow_failure: false
deploy:
  stage: deploy
  image: python:3.11-alpine
  dependencies:
  - setup
  - requirements
  before_script:
  - apk add --no-cache bash openssh-client
  - pip install ansible
  - "if [ -n \"${INPUT_SSH_KEY:-}\" ]; then\n  mkdir -p ~/.ssh\n  echo \"${INPUT_SSH_KEY}\"\
    \ > ~/.ssh/id_rsa\n  chmod 600 ~/.ssh/id_rsa\nfi\n"
  - "if [ -n \"${INPUT_SSH_KNOWN_HOSTS:-}\" ]; then\n  mkdir -p ~/.ssh\n  echo \"\
    ${INPUT_SSH_KNOWN_HOSTS}\" >> ~/.ssh/known_hosts\nfi\n"
  script:
  - ./src/step-deploy.sh
  rules:
  - if: $INPUT_SKIP_DEPLOY == "true"
    when: never
  - when: on_success
  artifacts:
    paths:
    - $INPUT_LOG_FILE
    expire_in: 30 days
status_check:
  stage: status_check
  image: python:3.11-alpine
  before_script:
  - apk add --no-cache bash openssh-client
  - pip install ansible
  script:
  - ./src/step-status.sh
  rules:
  - if: $INPUT_SKIP_STATUS_CHECK == "true"
    when: never
  - when: on_success
  allow_failure: true
publish_logs:
  stage: logs
  image: alpine:latest
  script:
  - echo "Ansible deployment complete" | tee -a $INPUT_LOG_FILE
  artifacts:
    paths:
    - $INPUT_LOG_FILE
    expire_in: 90 days
  when: always
dashboard_link:
  stage: logs
  image: alpine:latest
  needs:
  - publish_logs
  script:
  - echo "Generating Pipery Dashboard link..."
  - '# Get the artifact URL from GitLab API

    ARTIFACT_URL="${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts"

    echo "Artifact URL: $ARTIFACT_URL"


    # URL encode the artifact path

    ENCODED_URL=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1],safe=''''))"
    "$ARTIFACT_URL")


    # Create dashboard link

    DASHBOARD_URL="https://dash.pipery.dev/?artifact=${ENCODED_URL}"


    # Output the link in markdown format

    echo ""

    echo "=========================================="

    echo "Pipery Dashboard Link"

    echo "=========================================="

    echo "[$DASHBOARD_URL]($DASHBOARD_URL)"

    echo ""

    echo "Direct URL:"

    echo "$DASHBOARD_URL"

    echo "=========================================="

    echo ""


    # Save to artifact file for persistence

    mkdir -p artifacts

    echo "DASHBOARD_URL=$DASHBOARD_URL" > artifacts/dashboard_link.env

    '
  artifacts:
    paths:
    - artifacts/
    reports:
      dotenv: artifacts/dashboard_link.env
    expire_in: 90 days
  allow_failure: true
  when: always
