# GitLab CI Pipeline for pipery-ansible-cd
# Ansible playbook execution for infrastructure automation

variables:
  PROJECT_PATH: "."
  CONFIG_FILE: ".github/pipery/config.yaml"
  PLAYBOOK: "playbook.yml"  # Required
  INVENTORY: "inventory"  # Required
  REQUIREMENTS: ""
  ANSIBLE_REQUIREMENTS: ""
  EXTRA_VARS: ""
  BECOME: "false"
  TAGS: ""
  SKIP_REQUIREMENTS: "false"
  SKIP_DEPLOY: "false"
  SKIP_STATUS_CHECK: "false"
  LOG_FILE: "pipery.jsonl"

stages:
  - checkout
  - setup
  - requirements
  - deploy
  - status_check
  - logs

checkout:
  stage: checkout
  image: alpine:latest
  script:
    - echo "Repository checked out"

setup:
  stage: setup
  image: python:3.11-alpine
  script:
    - echo "Setting up Ansible environment..."
    - pip install ansible
    - ansible --version
    - echo "Setup complete"

requirements:
  stage: requirements
  image: python:3.11-alpine
  before_script:
    - pip install ansible
  script:
    - echo "Installing requirements..."
    - |
      if [ -n "$REQUIREMENTS" ]; then
        pip install -r $REQUIREMENTS
      fi
    - |
      if [ -n "$ANSIBLE_REQUIREMENTS" ]; then
        ansible-galaxy install -r $ANSIBLE_REQUIREMENTS
      fi
    - echo "Requirements installation complete"
  rules:
    - if: '$SKIP_REQUIREMENTS == "true"'
      when: never
    - when: on_success
  allow_failure: false

deploy:
  stage: deploy
  image: python:3.11-alpine
  dependencies:
    - setup
    - requirements
  before_script:
    - pip install ansible
    - |
      if [ -n "$SSH_KEY" ]; then
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
      fi
    - |
      if [ -n "$SSH_KNOWN_HOSTS" ]; then
        mkdir -p ~/.ssh
        echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
      fi
  script:
    - cd $PROJECT_PATH
    - |
      if [ -z "$PLAYBOOK" ] || [ -z "$INVENTORY" ]; then
        echo "ERROR: PLAYBOOK and INVENTORY must be set"
        exit 1
      fi
    - echo "Running Ansible playbook: $PLAYBOOK"
    - echo "Using inventory: $INVENTORY"
    - |
      ANSIBLE_FLAGS="-i $INVENTORY"
      [ "$BECOME" = "true" ] && ANSIBLE_FLAGS="$ANSIBLE_FLAGS -b"
      [ -n "$TAGS" ] && ANSIBLE_FLAGS="$ANSIBLE_FLAGS -t $TAGS"
      [ -n "$EXTRA_VARS" ] && ANSIBLE_FLAGS="$ANSIBLE_FLAGS -e '$EXTRA_VARS'"
    - |
      echo "Ansible command:"
      echo "ansible-playbook $PLAYBOOK $ANSIBLE_FLAGS"
      # In real scenario: ansible-playbook $PLAYBOOK $ANSIBLE_FLAGS
      echo "Playbook would execute"
    - echo "Deploy stage complete"
  rules:
    - if: '$SKIP_DEPLOY == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - $LOG_FILE
    expire_in: 30 days

status_check:
  stage: status_check
  image: python:3.11-alpine
  script:
    - echo "Checking playbook execution status..."
    - echo "Verifying target systems are in expected state"
  rules:
    - if: '$SKIP_STATUS_CHECK == "true"'
      when: never
    - when: on_success
  allow_failure: true

publish_logs:
  stage: logs
  image: alpine:latest
  script:
    - echo "Ansible deployment complete" | tee -a $LOG_FILE
  artifacts:
    paths:
      - $LOG_FILE
    expire_in: 90 days
  when: always
