# GitLab CI Pipeline for pipery-ansible-cd
# Ansible playbook execution for infrastructure automation

variables:
  PROJECT_PATH: "."
  CONFIG_FILE: ".pipery/config.yaml"
  INPUT_PROJECT_PATH: "."
  INPUT_CONFIG_FILE: ".pipery/config.yaml"
  INPUT_PLAYBOOK: "playbook.yml"  # Required
  INPUT_INVENTORY: "inventory"  # Required
  INPUT_REQUIREMENTS: ""
  INPUT_ANSIBLE_REQUIREMENTS: ""
  INPUT_EXTRA_VARS: ""
  INPUT_BECOME: "false"
  INPUT_TAGS: ""
  INPUT_SKIP_REQUIREMENTS: "false"
  INPUT_SKIP_DEPLOY: "false"
  INPUT_SKIP_STATUS_CHECK: "false"
  INPUT_LOG_FILE: "pipery.jsonl"

stages:
  - checkout
  - setup
  - download
  - requirements
  - deploy
  - status_check
  - logs

checkout:
  stage: checkout
  image: alpine:latest
  script:
    - echo "Repository checked out"

setup:
  stage: setup
  image: python:3.11-alpine
  before_script:
    - apk add --no-cache bash openssh-client
  script:
    - echo "Setting up Ansible environment..."
    - pip install ansible
    - ansible --version
    - echo "Setup complete"

download:
  stage: download
  image: alpine:latest
  script:
    - echo "Validating Ansible configuration..."
    - |
      if [ -z "${INPUT_PLAYBOOK}" ] || [ -z "${INPUT_INVENTORY}" ]; then
        echo "ERROR: INPUT_PLAYBOOK and INPUT_INVENTORY must be set"
        exit 1
      fi
    - echo "Configuration validated: ${INPUT_PLAYBOOK} with ${INPUT_INVENTORY}"

requirements:
  stage: requirements
  image: python:3.11-alpine
  before_script:
    - apk add --no-cache bash
    - pip install ansible
  script:
    - ./src/step-setup.sh
  rules:
    - if: '$INPUT_SKIP_REQUIREMENTS == "true"'
      when: never
    - when: on_success
  allow_failure: false

deploy:
  stage: deploy
  image: python:3.11-alpine
  dependencies:
    - setup
    - requirements
  before_script:
    - apk add --no-cache bash openssh-client
    - pip install ansible
    - |
      if [ -n "${INPUT_SSH_KEY:-}" ]; then
        mkdir -p ~/.ssh
        echo "${INPUT_SSH_KEY}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
      fi
    - |
      if [ -n "${INPUT_SSH_KNOWN_HOSTS:-}" ]; then
        mkdir -p ~/.ssh
        echo "${INPUT_SSH_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
      fi
  script:
    - ./src/step-deploy.sh
  rules:
    - if: '$INPUT_SKIP_DEPLOY == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - $INPUT_LOG_FILE
    expire_in: 30 days

status_check:
  stage: status_check
  image: python:3.11-alpine
  before_script:
    - apk add --no-cache bash openssh-client
    - pip install ansible
  script:
    - ./src/step-status.sh
  rules:
    - if: '$INPUT_SKIP_STATUS_CHECK == "true"'
      when: never
    - when: on_success
  allow_failure: true

publish_logs:
  stage: logs
  image: alpine:latest
  script:
    - echo "Ansible deployment complete" | tee -a $INPUT_LOG_FILE
  artifacts:
    paths:
      - $INPUT_LOG_FILE
    expire_in: 90 days
  when: always
